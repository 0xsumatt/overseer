{% extends "base.html" %}
{% block title %}basis · overseer{% endblock %}
{% block content %}
<div class="mb-5 flex flex-wrap items-end justify-between gap-4">
  <div>
    <div class="font-mono text-xs tracking-label uppercase text-phosphor">spot – perp spread</div>
    <h1 class="mt-1 text-xl font-semibold text-body">Basis</h1>
  </div>
  <div class="flex flex-wrap items-center gap-2 font-mono text-xs">
    <span class="text-dim">spot</span>
    <select id="spot" class="rounded border border-line bg-panel px-3 py-1.5 text-body focus:border-phosphor focus:outline-none">
      {% for s in series if s.market_type == 'spot' %}
      <option value="{{ s.exchange }}|{{ s.symbol }}">{{ s.exchange }} · {{ s.symbol }}</option>
      {% endfor %}
    </select>
    <span class="text-dim">perp</span>
    <select id="perp" class="rounded border border-line bg-panel px-3 py-1.5 text-body focus:border-phosphor focus:outline-none">
      {% for s in series if s.market_type == 'perp' %}
      <option value="{{ s.exchange }}|{{ s.symbol }}">{{ s.exchange }} · {{ s.symbol }}</option>
      {% endfor %}
    </select>
    <select id="hours" class="rounded border border-line bg-panel px-3 py-1.5 text-body focus:border-phosphor focus:outline-none">
      <option value="24">24h</option>
      <option value="48" selected>48h</option>
      <option value="168">7d</option>
    </select>
  </div>
</div>
<div id="chart" class="h-[480px] w-full rounded-md border border-line bg-panel/50"></div>
<div class="mt-2 flex flex-wrap items-baseline justify-between gap-2">
  <p class="font-mono text-[11px] text-faint">
    <span class="text-phosphor">—</span> basis % (right) ·
    <span class="text-gain">▮</span><span class="text-loss">▮</span> funding APR of the perp leg (left) ·
    long spot / short perp collects positive funding</p>
  <p id="carry-stat" class="font-mono text-[11px] text-dim"></p>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/lightweight-charts.standalone.js') }}"></script>
<script>
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout: { background: { color: 'transparent' }, textColor: '#667089',
            fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace' },
  grid: { vertLines: { color: '#161D2E' }, horzLines: { color: '#161D2E' } },
  crosshair: { vertLine: { color: '#3D465C' }, horzLine: { color: '#3D465C' } },
  timeScale: { timeVisible: true, secondsVisible: false, borderColor: '#232B3D' },
  rightPriceScale: { borderColor: '#232B3D' },
  leftPriceScale: { visible: true, borderColor: '#232B3D' },
  autoSize: true,
});
const line = chart.addLineSeries({
  color: '#FFB454', lineWidth: 2,
  priceFormat: { type: 'custom', formatter: v => v.toFixed(4) + '%' },
});
const zero = chart.addLineSeries({ color: '#232B3D', lineWidth: 1,
  priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
const funding = chart.addHistogramSeries({
  priceScaleId: 'left',
  priceFormat: { type: 'custom', formatter: v => v.toFixed(1) + '%' },
  base: 0,
});

async function load() {
  const [se, ss] = document.getElementById('spot').value.split('|');
  const [pe, ps] = document.getElementById('perp').value.split('|');
  const hours = document.getElementById('hours').value;
  const qs = new URLSearchParams({
    spot_exchange: se, spot_symbol: ss, perp_exchange: pe, perp_symbol: ps,
    interval: '1m', hours, limit: 10000,
  });
  const fqs = new URLSearchParams({ exchange: pe, symbol: ps, hours });
  const [data, fdata] = await Promise.all([
    (await fetch(`/api/basis?${qs}`)).json(),
    (await fetch(`/api/funding-history?${fqs}`)).json(),
  ]);
  line.setData(data.map(d => ({ time: d.time, value: d.basis_pct })));
  zero.setData(data.map(d => ({ time: d.time, value: 0 })));
  funding.setData(fdata.map(f => ({
    time: f.time, value: f.apr_pct,
    color: f.apr_pct >= 0 ? 'rgba(74,222,128,.45)' : 'rgba(251,113,133,.45)',
  })));

  const stat = document.getElementById('carry-stat');
  if (fdata.length) {
    const cum = fdata.reduce((s2, f) => s2 + f.rate, 0) * 100;
    const avg = fdata.reduce((s2, f) => s2 + f.apr_pct, 0) / fdata.length;
    stat.innerHTML = `Σ funding over window
      <span class="tabular-nums ${cum >= 0 ? 'text-gain' : 'text-loss'}">${cum >= 0 ? '+' : ''}${cum.toFixed(3)}%</span>
      · avg <span class="tabular-nums ${avg >= 0 ? 'text-gain' : 'text-loss'}">${avg >= 0 ? '+' : ''}${avg.toFixed(1)}% APR</span>
      · ${fdata.length} settlements`;
  } else {
    stat.textContent = 'no funding history for this perp in window';
  }
  chart.timeScale().fitContent();
}
for (const id of ['spot', 'perp', 'hours'])
  document.getElementById(id).addEventListener('change', load);
load();
</script>
{% endblock %}
